name: Feature Request
description: Suggest a focused RiverWise improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the gauge, provider, location, or dashboard workflow this would improve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like RiverWise to do?
    validations:
      required: true
  - type: input
    id: riverwise_version
    attributes:
      label: RiverWise version
      placeholder: v0.2.5
    validations:
      required: false
  - type: input
    id: gauge
    attributes:
      label: Gauge/station code or area
      placeholder: MELO1 / Waccamaw River / River Thames
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Screenshots, examples, or related apps/features are welcome.
    validations:
      required: false
